{
  "openapi": "3.0.0",
  "info": {
    "title": "Smart Delivery Robot API",
    "version": "1.0.0",
    "description": "API for managing delivery robots, tracking deliveries, and OTP verification"
  },
  "servers": [
    { "url": "http://localhost:5000", "description": "Development" }
  ],
  "components": {
    "securitySchemes": {
      "bearerAuth": { "type": "http", "scheme": "bearer", "bearerFormat": "JWT" }
    },
    "schemas": {
      "User": {
        "type": "object",
        "properties": {
          "_id": { "type": "string" },
          "username": { "type": "string" },
          "role": { "type": "string", "enum": ["admin", "staff"] }
        }
      },
      "Delivery": {
        "type": "object",
        "properties": {
          "deliveryId": { "type": "string" },
          "destination": { "type": "object", "properties": { "lat": { "type": "number" }, "lng": { "type": "number" } } },
          "status": { "type": "string", "enum": ["Pending", "In Progress", "Arrived", "Delivered", "Failed"] },
          "otp": { "type": "string" },
          "otpExpiry": { "type": "string", "format": "date-time" },
          "startTime": { "type": "string", "format": "date-time" },
          "endTime": { "type": "string", "format": "date-time" },
          "batteryUsed": { "type": "number" },
          "startBattery": { "type": "number" }
        }
      },
      "RobotState": {
        "type": "object",
        "properties": {
          "lat": { "type": "number" },
          "lng": { "type": "number" },
          "battery": { "type": "number" },
          "status": { "type": "string" },
          "wifi": { "type": "number" },
          "obstacle": { "type": "boolean" }
        }
      },
      "Preset": {
        "type": "object",
        "properties": {
          "_id": { "type": "string" },
          "name": { "type": "string" },
          "lat": { "type": "number" },
          "lng": { "type": "number" }
        }
      },
      "Settings": {
        "type": "object",
        "properties": {
          "otpEnabled": { "type": "boolean" },
          "otpExpiryTime": { "type": "number" },
          "maxSpeed": { "type": "number" },
          "obstacleSensitivity": { "type": "number" }
        }
      },
      "Error": {
        "type": "object",
        "properties": { "error": { "type": "string" } }
      }
    }
  },
  "paths": {
    "/health": {
      "get": {
        "summary": "Health check",
        "responses": { "200": { "description": "Service is healthy" } }
      }
    },
    "/api/auth/login": {
      "post": {
        "summary": "User login",
        "tags": ["Auth"],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "properties": {
                  "username": { "type": "string" },
                  "password": { "type": "string" }
                },
                "required": ["username", "password"]
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Login successful",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "token": { "type": "string" },
                    "user": { "$ref": "#/components/schemas/User" }
                  }
                }
              }
            }
          },
          "401": { "description": "Invalid credentials" }
        }
      }
    },
    "/api/robot/state": {
      "get": {
        "summary": "Get robot state",
        "tags": ["Robot"],
        "security": [{ "bearerAuth": [] }],
        "responses": {
          "200": { "description": "Robot state", "content": { "application/json": { "schema": { "$ref": "#/components/schemas/RobotState" } } } },
          "401": { "description": "Unauthorized" }
        }
      }
    },
    "/api/robot/command": {
      "post": {
        "summary": "Send robot command",
        "tags": ["Robot"],
        "security": [{ "bearerAuth": [] }],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "properties": {
                  "command": { "type": "string" },
                  "payload": { "type": "object" }
                },
                "required": ["command"]
              }
            }
          }
        },
        "responses": { "200": { "description": "Command sent" }, "401": { "description": "Unauthorized" } }
      }
    },
    "/api/deliveries": {
      "get": {
        "summary": "Get all deliveries",
        "tags": ["Deliveries"],
        "security": [{ "bearerAuth": [] }],
        "responses": {
          "200": { "description": "List of deliveries", "content": { "application/json": { "schema": { "type": "array", "items": { "$ref": "#/components/schemas/Delivery" } } } } }
        }
      },
      "post": {
        "summary": "Create delivery",
        "tags": ["Deliveries"],
        "security": [{ "bearerAuth": [] }],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "properties": {
                  "lat": { "type": "number" },
                  "lng": { "type": "number" }
                },
                "required": ["lat", "lng"]
              }
            }
          }
        },
        "responses": { "200": { "description": "Delivery created" }, "400": { "description": "Invalid input" } }
      }
    },
    "/api/presets": {
      "get": {
        "summary": "Get location presets",
        "tags": ["Presets"],
        "security": [{ "bearerAuth": [] }],
        "responses": {
          "200": { "description": "List of presets", "content": { "application/json": { "schema": { "type": "array", "items": { "$ref": "#/components/schemas/Preset" } } } } }
        }
      },
      "post": {
        "summary": "Create preset",
        "tags": ["Presets"],
        "security": [{ "bearerAuth": [] }],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "properties": {
                  "name": { "type": "string" },
                  "lat": { "type": "number" },
                  "lng": { "type": "number" }
                },
                "required": ["name", "lat", "lng"]
              }
            }
          }
        },
        "responses": { "200": { "description": "Preset created" } }
      }
    },
    "/api/settings": {
      "get": {
        "summary": "Get robot settings",
        "tags": ["Settings"],
        "security": [{ "bearerAuth": [] }],
        "responses": { "200": { "description": "Robot settings", "content": { "application/json": { "schema": { "$ref": "#/components/schemas/Settings" } } } } }
      },
      "put": {
        "summary": "Update robot settings",
        "tags": ["Settings"],
        "security": [{ "bearerAuth": [] }],
        "requestBody": { "content": { "application/json": { "schema": { "$ref": "#/components/schemas/Settings" } } } },
        "responses": { "200": { "description": "Settings updated" } }
      }
    },
    "/api/users": {
      "get": {
        "summary": "Get all users",
        "tags": ["Users"],
        "security": [{ "bearerAuth": [] }],
        "responses": { "200": { "description": "List of users" } }
      },
      "post": {
        "summary": "Create user",
        "tags": ["Users"],
        "security": [{ "bearerAuth": [] }],
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "properties": {
                  "username": { "type": "string" },
                  "password": { "type": "string" },
                  "role": { "type": "string", "enum": ["admin", "staff"] }
                },
                "required": ["username", "password"]
              }
            }
          }
        },
        "responses": { "200": { "description": "User created" } }
      }
    },
    "/api/analytics": {
      "get": {
        "summary": "Get delivery analytics",
        "tags": ["Analytics"],
        "security": [{ "bearerAuth": [] }],
        "parameters": [
          { "name": "timeRange", "in": "query", "schema": { "type": "string", "enum": ["today", "7d", "30d"] } }
        ],
        "responses": { "200": { "description": "Analytics data" } }
      }
    }
  }
}
